<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d2137">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Kollektivtrafik</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ═══ HEADER ═══ -->
  <div id="hd">
    <img src="/icon-192.png" id="logo-icon" alt="" /><span id="logo">KOLLEKTIVTRAFIK</span>
  </div>

  <!-- ═══ TOOLBAR (en rad) ═══ -->
  <div id="tb">
    <button class="tb-btn primary" id="btn-trip" title="Sök resa">Sök resa</button>
    <select id="region-select" title="Filtrera på län">
      <option value="all" selected>Alla län</option>
      <option value="otraf">Östergötland</option>
      <option value="orebro">Örebro</option>
    </select>
    <label class="tb-tog" title="Visa/dölj hållplatser"><input type="checkbox" id="chk-stops" /><span>Hållplatser</span></label>
    <label class="tb-tog" title="Visa/dölj fordon som inte är i trafik"><input type="checkbox" id="chk-inactive" checked /><span>Parkerade</span></label>
    <button class="tb-btn" id="btn-search" title="Sök hållplats">Sök hållplats</button>
    <button class="tb-btn icon" id="btn-locate" title="Min position"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg></button>
    <button class="tb-btn icon" id="btn-theme" title="Byt tema"><svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
    <div class="tb-sep"></div>
    <button class="fbtn on" data-type="bus" title="Visa/dölj bussar"><span class="fd" style="--c:var(--teal)"></span>Buss</button>
    <button class="fbtn on" data-type="train" title="Visa/dölj tåg"><span class="fd" style="--c:var(--green)"></span>Tåg</button>
    <button class="fbtn on" data-type="tram" title="Visa/dölj spårvagnar"><span class="fd" style="--c:var(--cyan)"></span>Spårvagn</button>
    <div class="tb-sep"></div>
    <span id="tb-live"><span id="live-dot"></span><span id="v-count">—</span> fordon i trafik</span>
  </div>

  <!-- Sök resa -->
  <div id="trip-bar" class="hidden">
    <div class="tp-f">
      <input type="text" id="tf" placeholder="Från" />
      <button class="tp-sw" id="ts"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 4v16m0 0l-4-4m4 4l4-4M17 20V4m0 0l4 4m-4-4l-4 4"/></svg></button>
      <input type="text" id="tt" placeholder="Till" />
    </div>
    <div class="tp-fl">
      <label class="tp-c"><input type="radio" name="pf" value="all" checked>Alla</label>
      <label class="tp-c"><input type="radio" name="pf" value="train">Tåg</label>
      <label class="tp-c"><input type="radio" name="pf" value="bus">Buss</label>
    </div>
    <button class="tp-go" id="tgo">Sök</button>
    <div id="trip-results"></div>
  </div>

  <!-- Sök hållplats -->
  <div id="search-bar" class="hidden">
    <input type="text" id="search" placeholder="Sök hållplats..." autocomplete="off" />
    <div id="search-list" class="hidden"></div>
  </div>

  <!-- Följ -->
  <div id="follow" class="hidden">
    <span id="follow-text"></span>
    <button id="follow-end"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>

  <!-- Karta -->
  <div id="map"></div>

  <!-- Sidopanel -->
  <div id="stops-panel">
    <div id="sp-empty">
      <div id="sp-placeholder">Klicka på ett fordon för att se hållplatser</div>
    </div>
    <div id="sp-content" class="hidden"></div>
  </div>

  <!-- Kort -->
  <div id="card" class="hidden">
    <div id="card-inner"></div>
  </div>

  <!-- Mobil navbar -->
  <nav id="mob-nav">
    <button class="nav-btn" id="nav-trip">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
      <span>Sök resa</span>
    </button>
    <button class="nav-btn" id="nav-search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <span>Sök</span>
    </button>
    <button class="nav-btn" id="nav-filter">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
      <span>Filter</span>
    </button>
    <button class="nav-btn" id="nav-locate">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
      <span>Position</span>
    </button>
    <button class="nav-btn" id="nav-more">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      <span>Mer</span>
    </button>
  </nav>

  <!-- Mobil filter-panel -->
  <div id="mob-filter" class="hidden">
    <div id="mob-filter-inner">
      <div class="mf-title">Filter</div>
      <div class="mf-section">
        <div class="mf-label">Fordonstyp</div>
        <div class="mf-row">
          <button class="mf-btn on" data-type="bus"><span class="fd" style="--c:var(--teal)"></span>Buss</button>
          <button class="mf-btn on" data-type="train"><span class="fd" style="--c:var(--green)"></span>Tåg</button>
          <button class="mf-btn on" data-type="tram"><span class="fd" style="--c:var(--cyan)"></span>Spårvagn</button>
        </div>
      </div>
      <div class="mf-section">
        <div class="mf-label">Län</div>
        <select id="mob-region">
          <option value="all" selected>Alla län</option>
          <option value="otraf">Östergötland</option>
          <option value="orebro">Örebro</option>
        </select>
      </div>
      <div class="mf-section">
        <div class="mf-row">
          <label class="mf-toggle"><input type="checkbox" id="mob-chk-stops" /><span>Hållplatser</span></label>
          <label class="mf-toggle"><input type="checkbox" id="mob-chk-inactive" checked /><span>Parkerade</span></label>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobil mer-meny -->
  <div id="mob-more" class="hidden">
    <div id="mob-more-inner">
      <button class="mm-btn" id="mm-theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Byt tema</button>
      <button class="mm-btn" id="mm-alerts">Störningar <span id="mob-al-count"></span></button>
      <button class="mm-btn" id="mm-stats">Statistik</button>
      <button class="mm-btn" id="mm-info">Om</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
